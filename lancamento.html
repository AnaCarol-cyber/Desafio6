<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lançamento</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header class="header">
        <a href="index.html">
            <img src="img/logo-ford-256.png" alt="Ford Logo" class="logo">
        </a>

        <nav class="menu">
            <a href="index.html">Home</a>
            <a href="lancamento.html">Lançamento</a>
            <a href="contato.html">Contato</a>

        </nav>
    </header>

    <main class="conteudo">

        <section class="video">

            <iframe width="1337" height="550" src="https://www.youtube.com/embed/vQsryuNmsL0"
                title="Ford Ranger 2022 | Gerações" frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>
            </iframe>

            <p>
                Caso o vídeo não carregue,
                <a href="https://www.youtube.com/watch?v=vQsryuNmsL0" target="_blank" rel="noopener noreferrer">
                    assista diretamente no YouTube
                </a>
            </p>

        </section>
        <section class="comparacao">
            <div class="modelo">
                <img src="img/storm.jpg" alt="Ranger Storm">
                <label>
                    <input type="checkbox" name="modelo">
                    <div class="info-modelo">
                        <span class="nome-modelo">Storm 3.2 Diesel 4x4 AT 2022</span>
                        <div class="linha-preco">
                            <span class="preco">A partir de R$ 222.790</span>
                            <img src="img/info.png" alt="Informações adicionais" class="info-icon">
                        </div>

                    </div>
                </label>
            </div>

            <div class="modelo">
                <img src="img/XL Cabine.jpg" alt="Ranger XL Cabine Simples">
                <label>
                    <input type="checkbox" name="modelo" checked>
                    <div class="info-modelo">
                        <span class="nome-modelo">XL Cabine Simples 2.2 Diesel<br>
                            4x4 MT Flex Work</span>

                        <div class="linha-preco">
                            <span class="preco">A partir de R$ 183.850</span>
                            <img src="img/info.png" alt="Informações adicionais" class="info-icon">
                        </div>

                    </div>
                </label>
            </div>

            <div class="modelo">
                <img src="img/xls 2.2 diesel.jpg" alt="Ranger XLS 2.2 Diesel">
                <label>
                    <input type="checkbox" name="modelo" checked>
                    <div class="info-modelo">
                        <span class="nome-modelo">XLS 2.2 Diesel 4x4 AT 2022</span>

                        <div class="linha-preco">
                            <span class="preco">A partir de R$ 220.690</span>
                            <img src="img/info.png" alt="Informações adicionais" class="info-icon">
                        </div>
                    </div>
                </label>
            </div>


        </section>

        <div class="botao-comparar">
            <button id="btnComparar">Comparar Carros</button>
        </div>
        <script>
            document.getElementById("btnComparar").addEventListener("click", function () {
                alert("Em breve você poderá comparar os modelos selecionados!");
            });
        </script>
    </main>

    <footer class="footer">
        <div class="footer-conteudo">

            <div class="redes">

                <a href="https://www.facebook.com/FordBrasil?locale=pt_BR" target="_blank" rel="noopener noreferrer">
                    <img src="img/facebook-50.png" alt="Facebook Ford Brasil">
                </a>

                <a href="https://www.instagram.com/fordbrasil/" target="_blank" rel="noopener noreferrer">
                    <img src="img/instagram-logo-50.png" alt="Instagram Ford Brasil">
                </a>

                <a href="https://www.youtube.com/@FordBrasil" target="_blank" rel="noopener noreferrer">
                    <img src="img/youtube-squared-50.png" alt="YouTube Ford Brasil">
                </a>
            </div>

            <div class="copyart">
                <p>
                    <a href="https://www.ford.com.br/copyright/" target="_blank" rel="noopener noreferrer">
                        &copy;2026
                    </a>
                </p>
            </div>

            <div class="logo-footer">
                <a href="index.html">
                    <img src="img/ford-96.png" alt="Ford Logo">
                </a>
            </div>

        </div>
    </footer>
</body>

</html>
