<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ford</title>    
    <link href="css/reset.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link href="css/form.css" rel="stylesheet">
    <script src="js/form.js"></script>
</head>

<body>
    <header class="header">
        <a href="index.html">
            <img src="img/logo-ford-256.png" alt="Ford Logo" class="logo">
        </a>

        <nav class="menu">
            <a href="index.html">Home</a>
            <a href="lancamento.html">Lançamento</a>
            <a href="contato.html">Contato</a>

        </nav>
    </header>

    <main class="conteudo">

        <section class="contato-container">

            <div class="contato-imagem">
                <img src="img/xls 2.2 diesel.jpg" alt="Ranger XLS 2.2 Diesel">
            </div>

            <div class="formulario">

                <h2>Sobre você</h2>

                <form onsubmit="Post(this);">
                    <div class="form-grid">

                    <input type="text" name="nome" placeholder="NOME*" required pattern="[A-Za-zÀ-ÿ\s]+"
                        title="Digite apenas letras">

                    <input type="email" name="email" placeholder="E-MAIL*" required>

                    <input type="text" name="cpf" placeholder="CPF*" required maxlength="14" onkeyup="handleCPF(event)"
                        pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" title=" Digite apenas números">
                   

                     <input type="text" name="sobrenome" placeholder="SOBRENOME*" required pattern="[A-Za-zÀ-ÿ\s]+"
                        title="Digite apenas letras">


                    <input type="tel" name="telefone" placeholder="(DD) Telefone*" required maxlength="15"
                        onkeyup="handlePhone(event)" pattern="\([0-9]{2}\)\s[0-9]{4,5}-[0-9]{4}"
                        title="Digite no formato (11) 91234-5678">
                    

                    <select name="contato" required aria-label="Como deseja ser contatado">
                        <option value="">COMO DESEJA SER CONTATADO</option>
                        <option>TELEFONE</option>
                        <option>EMAIL</option>
                      
                    </select>



                    <button type="submit" class="botao-enviar">Enviar</button>

                </form>

            </div>

        </section>
    </main>
    <footer class="footer">
        <div class="footer-conteudo">

            <div class="redes">


                <a href="https://www.facebook.com/FordBrasil?locale=pt_BR" target="_blank"
                    rel="noopener noreferrer noreferrer">
                    <img src="img/facebook-50.png" alt="Facebook Ford Brasil">
                </a>

                <a href="https://www.instagram.com/fordbrasil/" target="_blank" rel="noopener noreferrer noreferrer">
                    <img src="img/instagram-logo-50.png" alt="Instagram Ford Brasil">
                </a>

                <a href="https://www.youtube.com/@FordBrasil" target="_blank" rel="noopener noreferrer noreferrer">
                    <img src="img/youtube-squared-50.png" alt="YouTube Ford Brasil">
                </a>
            </div>

            <div class="copyart">
                <p>
                    <a href="https://www.ford.com.br/copyright/" target="_blank" rel="noopener noreferrer">
                        &copy; 2026
                    </a>
                </p>
            </div>


            <div class="logo-footer">
                <a href="index.html">
                    <img src="img/ford-96.png" alt="Ford Logo">
                </a>
            </div>

        </div>
    </footer>

</body>

</html>
