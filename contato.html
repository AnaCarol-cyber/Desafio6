    <meta charset="UTF-8">

        <a href="index.html">

        <nav class="menu">
           <a href="index.html">Home</a>
           <a href="lancamento.html">Lançamento</a>
           <a href="contato.html">Contato</a>
    
        </nav>
        </header>

        <main class="conteudo">

            <section class="contato-container">

    <div class="contato-imagem">
        <img src="img/xls 2.2 diesel.jpg" alt="Ranger XLS 2.2 Diesel">
    </div>

    <div class="formulario">

        <h2>Sobre você</h2>

        <form class= "form-grid">

            <input 
                type="text"
                placeholder="NOME*"
                required
                pattern="[A-Za-zÀ-ÿ\s]+"
                title="Digite apenas letras"
            >
           
            <input 
                type="email"
                placeholder="E-MAIL*"
                required
            >
            
            
            <input
             type="tel"
            name="telefone"
             placeholder="DDD + Telefone*"
            required
            maxlength="15"
            pattern="\([0-9]{2}\)\s[0-9]{4,5}-[0-9]{4}"
             title="Digite no formato (11) 91234-5678"
             >
            
            
            <select required>
                <option value="">TIPO DE CONTATO</option>
                <option>Elogio</option>
                <option>Reclamação</option>
                <option>Solicitação</option>
            </select>
            
            
            <textarea placeholder="MENSAGEM" required></textarea>
            
            <button type="submit" class="botao-enviar">Enviar</button>

        </form>

    </div>

</section>
</main>
